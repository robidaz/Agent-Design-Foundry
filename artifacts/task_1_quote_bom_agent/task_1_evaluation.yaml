  open_items:
    - item: "Interaction channel / UX surface for agent (CLI, chat, API, web form?)"
      phase_blocked: "Phase 4.1 (canvas_channels)"
      why_it_matters: "Determines how SE submits requirements and receives BOM; affects prompt design and tool interface"
      suggested_resolution: "Ask client during next requirements session"
    - item: "Success metric numeric targets (supported answer rate, completion rate, escalation rate)"
      phase_blocked: "Phase 1.3 and Phase 5.1"
      why_it_matters: "Without targets there is no pass/fail criterion for evaluation harness"
      suggested_resolution: "Ask SE/PM to define acceptable quality bar before build; suggest starting with >90% supported answer rate"
    - item: "Abstention threshold for low-confidence matches"
      phase_blocked: "Phase 5.2 (abstain_low_confidence)"
      why_it_matters: "Agent needs a confidence floor below which it should abstain rather than return speculative BOM line"
      suggested_resolution: "Define in rulesets & guidelines document; SE to specify during ruleset authoring session"
    - item: "Behavior when conflicting catalog data exists for same SKU across distributors"
      phase_blocked: "Phase 5.2 (abstain_conflict)"
      why_it_matters: "Multiple distributors may list different lead times for identical SKUs; agent must know which to prefer or flag conflict"
      suggested_resolution: "Add conflict-resolution rule to rulesets & guidelines document; SE to specify priority order"
    - item: "Incomplete requirement at intake line 33: 'If initial user request can not be met' — sentence is cut off"
      phase_blocked: "Phase 4.5 (behavior_abstention)"
      why_it_matters: "Fallback behavior for unmet specific vendor/SKU requests is undefined"
      suggested_resolution: "Obtain full sentence from client; likely intent is agent must report constraint violation and offer alternatives"
    - item: "Identity / auth infrastructure"
      phase_blocked: "Phase 2.2 (tooling_identity)"
      why_it_matters: "Gating rulesets write access requires knowing auth model — who is a valid SE, how approval is signaled"
      suggested_resolution: "Ask client: is there an existing SSO or role system? How does the SE signal explicit write approval?"
    - item: "Line-of-business system integrations (CRM, ERP, quoting platform)"
      phase_blocked: "Phase 2.2 (tooling_lob)"
      why_it_matters: "Future BOM export or quote integration may require LOB connectors; scoping now prevents rework"
      suggested_resolution: "Ask client whether BOM output is standalone or must feed a quoting/CRM system"
    - item: "Rulesets document format"
      phase_blocked: "Phase 4.2 (knowledge_source)"
      why_it_matters: "Affects ingestion and parsing approach"
      suggested_resolution: "Ask SE what format the initial rulesets document will be authored in (plain text, YAML, JSON, structured template?)"
    - item: "Customer requirements input format"
      phase_blocked: "Phase 4.2 (knowledge_source)"
      why_it_matters: "Agent must parse this input; free text vs. structured form significantly affects prompt design"
      suggested_resolution: "Clarify with SE: will requirements be free-text prose, a structured checklist, or a templated form?"
    - item: "Catalog metadata approval status"
      phase_blocked: "Phase 4.2 (meta_approval)"
      why_it_matters: "If vendor catalog data requires approval before use, agent needs a filter"
      suggested_resolution: "Ask client: is there a data approval/QA step for catalog Python script output?"
    - item: "Data residency and air-gap requirements"
      phase_blocked: "Phase 6.3 (data_residency, air_gap)"
      why_it_matters: "Determines eligible LLM providers and whether cloud APIs are permissible"
      suggested_resolution: "Ask IT/legal: any data sovereignty or on-prem requirements for vendor pricing data?"
    - item: "Deployment model (raw_api, managed_cloud, self_hosted)"
      phase_blocked: "Phase 6.3 and Phase 7 (deployment_model)"
      why_it_matters: "Affects LLM provider selection, cost model, and security posture"
      suggested_resolution: "Resolve after data residency question is answered"
    - item: "Rollout versioning strategy and rollback trigger"
      phase_blocked: "Phase 7 (rollout artifacts, rollback_trigger)"
      why_it_matters: "Without defined rollback trigger a degraded agent cannot be safely reverted"
      suggested_resolution: "Architect to propose standard triggers (e.g., supported answer rate drops below threshold for N consecutive evaluations) for SE sign-off"
    - item: "Chunking / retrieval strategy for structured catalog data"
      phase_blocked: "Phase 4.2 (chunking_strategy)"
      why_it_matters: "JSON/YAML catalogs are best queried via structured lookup rather than vector search; approach must be selected before build"
      suggested_resolution: "Architect to evaluate catalog schema from Python script output; recommend structured query tool over vector chunking"
