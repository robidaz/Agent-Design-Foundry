      - action: "ROI projection publication"
        risk_level: "high"
        gate: "Consultant performs ROI sanity-check; projections labeled as illustrative"
        confidence: FOUND
        source: "include clearly labeled illustrative ROI projections (Assumptions line 16)"
    security:
