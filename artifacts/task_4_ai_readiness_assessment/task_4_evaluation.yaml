  phase_7_rollout:
    artifacts:
      system_prompt:
        versioned: true
        requires_eval: true
        confidence: INFERRED
        source: "Framework is versioned and governed by Dynamix; system prompts encoding rubric anchors should follow same versioning discipline"
      retrieval_config:
        versioned: null
        requires_eval: null
        confidence: NA
      model_version:
        versioned: null
        requires_eval: null
        confidence: UNKNOWN
      tool_definitions:
        versioned: true
        requires_eval: true
        confidence: INFERRED
        source: "Framework definition versioning (Assumptions line 17) extends to tool definitions that load and apply it"
