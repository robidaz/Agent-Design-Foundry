      value: null
      confidence: UNKNOWN

  open_items:
    - item: "Supported answer rate target not defined"
      phase_blocked: "Phase 5 — Evaluation"
      why_it_matters: "Without a numeric target, the team cannot write a passing/failing eval harness for PoC sign-off"
      suggested_resolution: "Ask Dynamix: what % of dimension scores must be verifiable against intake evidence to consider the agent production-ready?"
    - item: "Task completion rate target not defined"
      phase_blocked: "Phase 5 — Evaluation"
      why_it_matters: "No acceptance criterion for the completeness gate or full end-to-end run"
      suggested_resolution: "Define during PoC: track how often agent reaches completeness gate without intervention across synthetic test cases"
    - item: "Escalation rate target not defined"
      phase_blocked: "Phase 5 — Evaluation"
      why_it_matters: "Cannot calibrate the confidence threshold or follow-up cap without a target escalation rate"
      suggested_resolution: "Propose a default (e.g., <20% of dimensions flagged per engagement) and validate against synthetic scenarios"
    - item: "Conflicting intake response behavior not specified"
      phase_blocked: "Phase 5.2 — Abstention behavior"
      why_it_matters: "If two intake responses for the same sub-criterion contradict each other, agent behavior is undefined"
      suggested_resolution: "Specify: escalate to consultant, use conservative (lower) score, or flag as UNKNOWN"
    - item: "Identity / auth tooling for Dynamix's stack unknown"
      phase_blocked: "Phase 2 — Infrastructure"
      why_it_matters: "Cannot assess SSO, access control, or multi-consultant isolation without knowing the auth stack"
      suggested_resolution: "Check with Dynamix IT: is there an existing SSO or identity provider the PoC should integrate with?"
    - item: "Communication platform for consultant report delivery unknown"
      phase_blocked: "Phase 2 — Infrastructure"
      why_it_matters: "Determines how the consultant receives and reviews the draft markdown report outside the rendered PDF"
      suggested_resolution: "Ask Dynamix: is the markdown file delivered via email, shared drive, Slack, or lightweight web UI?"
    - item: "Prompt-injection mitigation strategy not defined"
      phase_blocked: "Phase 6.2 — Security"
      why_it_matters: "Intake responses are free-text and could carry adversarial content targeting the LLM"
      suggested_resolution: "Define: input sanitization, system prompt hardening, output validation layer"
    - item: "Sensitive-field redaction policy not defined"
      phase_blocked: "Phase 6.2 — Security"
      why_it_matters: "Pattern must be defined before handling real client intake data in production, even if PoC uses synthetic data"
      suggested_resolution: "Clarify: will intake responses ever contain employee names, org chart details, or financial specifics that must be masked in logs?"
    - item: "Rollback trigger not defined"
      phase_blocked: "Phase 7 — Rollout"
      why_it_matters: "Without a rollback criterion, a degraded model or changed rubric version could silently produce wrong scores"
      suggested_resolution: "Define: e.g., if supported answer rate drops below threshold on eval suite, revert to prior framework version and system prompt"
    - item: "LLM vendor and model version not specified"
      phase_blocked: "Phase 7 — Rollout"
      why_it_matters: "Model version pinning and eval-before-deploy discipline cannot be applied without knowing the target model"
      suggested_resolution: "Confirm with Dynamix: preferred LLM provider and whether model version must be pinned for consistency across engagements"
    - item: "Data residency requirement not addressed"
      phase_blocked: "Phase 6.3 — Constraints"
      why_it_matters: "If any future engagement handles data with regional residency requirements, current managed-cloud assumption may be invalid"
      suggested_resolution: "Ask Dynamix: is there a geographic region requirement for the cloud deployment?"
