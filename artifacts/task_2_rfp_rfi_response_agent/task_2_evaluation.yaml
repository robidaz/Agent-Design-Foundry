  open_items:
    - item: "Numeric success targets (supported answer rate, task completion rate, escalation rate)"
      phase_blocked: "1.3, 5.1"
      why_it_matters: "Without targets, PoC has no exit conditions and evaluation pass/fail cannot be defined"
      suggested_resolution: "Ask client: what % of questions answered without SME escalation constitutes a successful PoC? What supported-answer rate is acceptable?"
    - item: "Identity / auth system"
      phase_blocked: "2.2"
      why_it_matters: "If the SME console or escalation queue requires authenticated access, an auth layer must be designed before build"
      suggested_resolution: "Ask internal IT or client: is the PoC single-user or do multiple engineers need access with identity controls?"
    - item: "Curation owner for KB documents"
      phase_blocked: "4.2"
      why_it_matters: "Metadata governance and update policy require a named owner; without one, stale documents may persist undetected"
      suggested_resolution: "Ask client: who owns the KB files and is responsible for updating spec sheets or correcting prior RFP responses?"
    - item: "Metadata schema — date/version field"
      phase_blocked: "4.2"
      why_it_matters: "Retrieval cannot filter on document recency without a date/version tag; superseded responses could outrank current ones"
      suggested_resolution: "Ask client: are source documents versioned? Should retrieval prefer newer documents when similarity scores are equal?"
    - item: "Metadata schema — scope/jurisdiction field"
      phase_blocked: "4.2"
      why_it_matters: "If documents are scoped to specific products or regions, unscoped retrieval may return wrong answers for a given customer"
      suggested_resolution: "Ask client: do source documents apply universally or are some scoped to specific geographies, products, or customer tiers?"
    - item: "Prompt-injection mitigation strategy"
      phase_blocked: "6.2"
      why_it_matters: "RFP questions are user-supplied and could contain adversarial instructions; flagged as a risk in the intake but no mitigation specified"
      suggested_resolution: "Define in design: input sanitization approach, system-prompt isolation strategy, and whether KB content is treated as untrusted"
    - item: "Sensitive-field redaction in pipeline"
      phase_blocked: "6.2"
      why_it_matters: "If RFP content or KB includes pricing, NDA-covered specs, or PII and the LLM API is external, unredacted content leaves the trust boundary"
      suggested_resolution: "Ask client: does any KB or RFP content include pricing, NDA-covered specifications, or customer PII that must not be sent to an external API?"
    - item: "Data residency requirement"
      phase_blocked: "6.3"
      why_it_matters: "Contractual or regulatory requirements may constrain LLM API and vector store hosting choices"
      suggested_resolution: "Ask client or legal: are there requirements governing where RFP content and KB data may be processed?"
    - item: "Air-gap / on-prem requirement"
      phase_blocked: "6.3"
      why_it_matters: "Unclear whether local-only architecture is a permanent constraint or a PoC convenience; changes production deployment model"
      suggested_resolution: "Ask client: is the local-only architecture a permanent requirement, or is managed cloud acceptable for production?"
    - item: "Regulated data classification"
      phase_blocked: "6.3"
      why_it_matters: "If RFP content includes financial projections, healthcare data, or PII, GDPR/HIPAA/SOC2 controls may apply"
      suggested_resolution: "Ask client: what data classification applies to RFP content and KB source documents?"
    - item: "Rollback trigger / regression threshold"
      phase_blocked: "7"
      why_it_matters: "Without a defined trigger, there is no automatic signal to revert a prompt or model change that degrades answer quality"
      suggested_resolution: "Define: rollback if supported answer rate drops below X% on the synthetic test suite in CI"
    - item: "Out-of-scope question behavior"
      phase_blocked: "5.2"
      why_it_matters: "Intake defines NO-SOURCE behavior but does not distinguish 'no matching chunk' from 'question is topically outside KB scope'"
      suggested_resolution: "Ask client: should the agent signal when a question is entirely outside the KB's subject area vs. simply having no matching document?"
