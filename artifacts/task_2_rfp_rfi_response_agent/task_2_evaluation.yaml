      rationale:
        value: "Deterministic per-question workflow with three routing paths rather than open-ended planning loop"
        confidence: FOUND
        source: "three bands drive routing: HIGH (draft committed), MEDIUM (draft + SME-review flag), LOW/NO-SOURCE/CONFLICT (no draft; escalated to SME)"
    instructions_and_behavior:
      role:
        value: "Factual drafting assistant that cites sources, surfaces conflicts without adjudicating, and defaults to abstention over speculation"
        confidence: FOUND
        source: "the agent does not pick a winner; abstention is the default when retrieval support is insufficient"
      format:
        value: "Per-question artifact: status (drafted/escalated/conflict) + draft text (if applicable) + citations (source doc + chunk) + confidence band; rendered to markdown/PDF via Jinja"
        confidence: FOUND
        source: "per-question response artifact (status + draft + citations + confidence band) rendered via Jinja to markdown/PDF"
      citation:
        value: "Every drafted answer cites source doc + chunk; multi-source cites all contributing chunks; conflicting sources both cited, no winner selected"
        confidence: FOUND
        source: "Every drafted answer cites source document + chunk; when sources conflict, both versions are surfaced and cited"
      abstention:
        value: "LOW/NO-SOURCE/CONFLICT → no fabricated draft; retrieval evidence surfaced first to avoid anchoring bias; prefer 'I don't know' over hallucination"
        confidence: FOUND
        source: "Abstention is the default when retrieval support is insufficient — LOW/NO-SOURCE/CONFLICT items present retrieval evidence first (no fabricated draft) to avoid anchoring bias"
      scope:
